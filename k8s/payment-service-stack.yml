apiVersion: v1
kind: Namespace
metadata: { name: fgc }
---
apiVersion: v1
kind: Secret
metadata: { name: payment-api-secrets, namespace: fgc }
type: Opaque
stringData:
  sql-password: "rohPav-juKmeb-DIhku9!"
  connection-string: "Server=payment-db-service;Database=FGC_Payment;User Id=sa;Password=rohPav-juKmeb-DIhku9!;TrustServerCertificate=True"
  jwt-key: "8594df0eb5ecb4c96f8824462cc7d2e1885c138908f2f7b4357af54b72ab2ed6"
  rabbitmq-uri: "amqp://admin:admin123@rabbitmq-service:5672/"
---
apiVersion: v1
kind: ConfigMap
metadata: { name: payment-api-config, namespace: fgc }
data:
  jwt-issuer: fgcapi
  jwt-audience: fgcapi
  jwt-token-ttl: "10"
  order-created-exchange: fgc
  order-created-routing-key: order.created
  payment-processed-exchange: fgc
  payment-processed-routing-key: payment.processed
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: payment-db-pvc, namespace: fgc }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: payment-db, namespace: fgc }
spec:
  replicas: 1
  selector: { matchLabels: { app: payment-db } }
  template:
    metadata: { labels: { app: payment-db } }
    spec:
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2025-latest
          ports: [{ containerPort: 1433 }]
          env:
            - { name: ACCEPT_EULA, value: "Y" }
            - name: MSSQL_SA_PASSWORD
              valueFrom: { secretKeyRef: { name: payment-api-secrets, key: sql-password } }
          volumeMounts: [{ name: sql-data, mountPath: /var/opt/mssql }]
      volumes: [{ name: sql-data, persistentVolumeClaim: { claimName: payment-db-pvc } }]
---
apiVersion: v1
kind: Service
metadata: { name: payment-db-service, namespace: fgc }
spec:
  selector: { app: payment-db }
  ports: [{ port: 1433, targetPort: 1433 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: rabbitmq, namespace: fgc }
spec:
  replicas: 1
  selector: { matchLabels: { app: rabbitmq } }
  template:
    metadata: { labels: { app: rabbitmq } }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:management
          ports: [{ containerPort: 5672 }, { containerPort: 15672 }]
          env:
            - { name: RABBITMQ_DEFAULT_USER, value: admin }
            - { name: RABBITMQ_DEFAULT_PASS, value: admin123 }
---
apiVersion: v1
kind: Service
metadata: { name: rabbitmq-service, namespace: fgc }
spec:
  selector: { app: rabbitmq }
  ports:
    - { name: amqp, port: 5672, targetPort: 5672 }
    - { name: management, port: 15672, targetPort: 15672 }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: payment-api, namespace: fgc }
spec:
  replicas: 1
  selector: { matchLabels: { app: payment-api } }
  template:
    metadata: { labels: { app: payment-api } }
    spec:
      containers:
        - name: payment-api
          image: fgc-payment-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          env:
            - name: ConnectionStrings__Default
              valueFrom: { secretKeyRef: { name: payment-api-secrets, key: connection-string } }
            - name: Jwt__Issuer
              valueFrom: { configMapKeyRef: { name: payment-api-config, key: jwt-issuer } }
            - name: Jwt__Audience
              valueFrom: { configMapKeyRef: { name: payment-api-config, key: jwt-audience } }
            - name: Jwt__Key
              valueFrom: { secretKeyRef: { name: payment-api-secrets, key: jwt-key } }
            - name: Jwt__TokenTtlInMinutes
              valueFrom: { configMapKeyRef: { name: payment-api-config, key: jwt-token-ttl } }
            - name: RabbitMQ__URI
              valueFrom: { secretKeyRef: { name: payment-api-secrets, key: rabbitmq-uri } }
            - name: RabbitMQ__OrderCreatedEvent__Exchange
              valueFrom: { configMapKeyRef: { name: payment-api-config, key: order-created-exchange } }
            - name: RabbitMQ__OrderCreatedEvent__RoutingKey
              valueFrom: { configMapKeyRef: { name: payment-api-config, key: order-created-routing-key } }
            - name: RabbitMQ__PaymentProcessedEvent__Exchange
              valueFrom: { configMapKeyRef: { name: payment-api-config, key: payment-processed-exchange } }
            - name: RabbitMQ__PaymentProcessedEvent__RoutingKey
              valueFrom: { configMapKeyRef: { name: payment-api-config, key: payment-processed-routing-key } }
---
apiVersion: v1
kind: Service
metadata: { name: payment-api-service, namespace: fgc }
spec:
  type: NodePort
  selector: { app: payment-api }
  ports: [{ port: 80, targetPort: 8080, nodePort: 30082 }]
